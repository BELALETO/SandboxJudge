openapi: 3.0.0
info:
  title: SandboxJudge API
  description: API documentation for SandboxJudge platform
  version: 1.0.0
servers:
  - url: /api/v1
    description: API v1 Base URL
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [User, Admin]
        photo:
          type: string
    Problem:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [Easy, Medium, Hard]
        tags:
          type: array
          items:
            type: string
        testCases:
          type: array
          items:
            type: object
            properties:
              input:
                type: string
              output:
                type: string
        points:
          type: integer
    Submission:
      type: object
      properties:
        _id:
          type: string
        problem:
          $ref: '#/components/schemas/Problem'
        user:
          $ref: '#/components/schemas/User'
        language:
          type: string
        code:
          type: string
        status:
          type: string
          enum: [Pending, In Progress, AC, WA, TLE, MLE, RE, CE]
        timeCost:
          type: number
        memoryCost:
          type: number
        submittedAt:
          type: string
          format: date-time
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, password, passwordConfirm]
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                passwordConfirm:
                  type: string
      responses:
        '201':
          description: User registered successfully
  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
  /auth/forgot-password:
    post:
      summary: Forgot password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Token sent to email
  /auth/reset-password/{token}:
    post:
      summary: Reset password
      tags: [Auth]
      parameters:
        - in: path
          name: token
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
      responses:
        '200':
          description: Password reset successful
  /users:
    get:
      summary: Get all users
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /users/{id}:
    get:
      summary: Get user by ID
      tags: [Users]
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '200':
          description: OK
    patch:
      summary: Update user
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: OK
    delete:
      summary: Delete user
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '204':
          description: No Content
  /users/updateMe:
    patch:
      summary: Update current user
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                   type: string
      responses:
        '200':
          description: OK
  /users/deleteMe:
    delete:
      summary: Deactivate current user
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
  /users/leaderboard:
    get:
      summary: Get leaderboard
      tags: [Users]
      responses:
        '200':
          description: OK
  /problems:
    get:
      summary: Get all problems
      tags: [Problems]
      responses:
        '200':
          description: OK
    post:
      summary: Create a problem
      tags: [Problems]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Problem'
      responses:
        '201':
          description: Created
  /problems/{slug}:
    get:
      summary: Get problem by slug
      tags: [Problems]
      parameters:
        - in: path
          name: slug
          schema:
            type: string
          required: true
      responses:
        '200':
          description: OK
    patch:
      summary: Update a problem
      tags: [Problems]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Problem'
      responses:
        '200':
          description: OK
    delete:
      summary: Delete a problem
      tags: [Problems]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          schema:
            type: string
          required: true
      responses:
        '204':
          description: No Content
  /submit:
    get:
      summary: Get all submissions
      tags: [Submissions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create a submission
      tags: [Submissions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user, problem, code, language]
              properties:
                user:
                  type: string
                problem:
                  type: string
                language:
                  type: string
                code:
                  type: string
      responses:
        '201':
          description: Created
  /submit/{id}:
    get:
      summary: Get submission by ID
      tags: [Submissions]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        '200':
          description: OK
