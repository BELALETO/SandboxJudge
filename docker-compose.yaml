services:
  mongodb:
    image: 'mongo'
    container_name: 'mongodb'
    volumes:
      - data:/data/db
    ports:
      - '27017:27017'
  redis:
    image: 'redis'
    container_name: 'redis'
    ports:
      - '6379:6379'
  backend:
    build: .
    ports:
      - '5000:5000'
    volumes:
      - logs:/app/logs
      - ./src:/app/src
      - /app/node_modules
    environment:
      - MONGO_URI=mongodb://mongodb:27017/SandboxJudge
    depends_on:
      - mongodb
      - redis
volumes:
  data:
  logs:
